defaults:
  - dgp: openml
  - synthetic-test
  - _self_

data_size: 100
num_queries: 24
query_source: test_data
rollout_times: 8
rollout_length: 30
seed: 999

n_estimators: 4
average_before_softmax: False

plot_rows: 3
plot_cols: 4
queries_per_figure: 12

metrics:
  emd:
    enabled: true
    distance: l1
    reference_depth: 0
    average_from_depth: 1

date: ${now:%Y-%m-%d}
lastrun: ${now:%Y-%m-%dT%H:%M:%S%z}
git: ${githash:}

hydra:
  run:
    dir: "./outputs/${date}/fixed-query-belief/name=${dgp.name}_data=${data_size}_queries=${num_queries}_rollout_length=${rollout_length}_rollout_times=${rollout_times}_seed=${seed}_query_source=${query_source}"
  sweep:
    dir: ${hydra.run.dir}
    subdir: .
