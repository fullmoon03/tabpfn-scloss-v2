defaults:
  - dgp: openml
  - _self_

dgp:
  name: vehicle

data_size: 100
num_queries: 24
rollout_times: 8
rollout_length: 30
seed: 999

n_estimators: 4
average_before_softmax: False

plot_rows: 3
plot_cols: 4
queries_per_figure: 12

date: ${now:%Y-%m-%d}
lastrun: ${now:%Y-%m-%dT%H:%M:%S%z}
git: ${githash:}

hydra:
  run:
    dir: "./outputs/${date}/fixed-query-belief/name=${dgp.name}_data=${data_size}_queries=${num_queries}_rollout_length=${rollout_length}_rollout_times=${rollout_times}_seed=${seed}"
  sweep:
    dir: ${hydra.run.dir}
    subdir: .
