defaults:
  - dgp: openml
  - synthetic-test
  - _self_

data_size: 100
num_queries: 24
query_source: context
n_repeats: 200
rollout_times: 8
rollout_length: 30
seed: 999

n_estimators: 4
average_before_softmax: False
ece_bins: 10

metrics:
  emd:
    distance: l1
    reference_depth: 0
    average_from_depth: 1

date: ${now:%Y-%m-%d}
lastrun: ${now:%Y-%m-%dT%H:%M:%S%z}
git: ${githash:}

hydra:
  run:
    dir: "./outputs/${date}/emd-calibration-relationship/name=${dgp.name}_data=${data_size}_queries=${num_queries}_repeats=${n_repeats}_rollout_length=${rollout_length}_rollout_times=${rollout_times}_seed=${seed}_query_source=${query_source}"
  sweep:
    dir: ${hydra.run.dir}
    subdir: .
