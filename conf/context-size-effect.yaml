defaults:
  - dgp: openml
  - _self_

data_size: 100
num_queries: 24
context_sizes: [30, 50, 75, 100, 200, 300, 400, 500]
n_repeats: 16
seed: 999
query_seed: 1999
context_seed: 2999

rollout_times: 8
rollout_length: 30

n_estimators: 4
average_before_softmax: False
ece_bins: 5

metrics:
  emd:
    distance: l1
    reference_depth: 0
    average_from_depth: 1

date: ${now:%Y-%m-%d}
lastrun: ${now:%Y-%m-%dT%H:%M:%S%z}
git: ${githash:}

hydra:
  run:
    dir: "./outputs/${date}/context-size-effect/name=${dgp.name}_queries=${num_queries}_repeats=${n_repeats}_rollout_length=${rollout_length}_rollout_times=${rollout_times}_seed=${seed}"
  sweep:
    dir: ${hydra.run.dir}
    subdir: .
