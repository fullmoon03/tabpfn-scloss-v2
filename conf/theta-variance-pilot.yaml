defaults:
  - dgp: openml
  - synthetic-test
  - _self_

data_size: 100
num_queries: 24
rollout_times: 50
rollout_length: 30
seed: 999

n_estimators: 4
average_before_softmax: False

theta_variance:
  ddof: 1
  start_depth: 1

date: ${now:%Y-%m-%d}
lastrun: ${now:%Y-%m-%dT%H:%M:%S%z}
git: ${githash:}

hydra:
  run:
    dir: "./outputs/${date}/theta-variance-pilot/name=${dgp.name}_data=${data_size}_queries=${num_queries}_rollout_length=${rollout_length}_rollout_times=${rollout_times}_seed=${seed}"
  sweep:
    dir: ${hydra.run.dir}
    subdir: .
