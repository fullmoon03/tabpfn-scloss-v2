defaults:
  - dgp: openml
  - synthetic-test
  - _self_

data_size: 100
num_queries: 24
query_source: context
rollout_times: 30
rollout_length: 300
seed: 999

n_estimators: 4
average_before_softmax: false

base_checkpoint_path: tabpfn-v2-classifier.ckpt
tuned_checkpoint_path: null
device: null

plot_rows: 3
plot_cols: 4
queries_per_figure: 12

date: ${now:%Y-%m-%d}
lastrun: ${now:%Y-%m-%dT%H:%M:%S%z}
git: ${githash:}

hydra:
  run:
    dir: "./outputs/${date}/fixed-query-belief-comparison/name=${dgp.name}_data=${data_size}_queries=${num_queries}_rollout_length=${rollout_length}_rollout_times=${rollout_times}_seed=${seed}_query_source=${query_source}"
  sweep:
    dir: ${hydra.run.dir}
    subdir: .
